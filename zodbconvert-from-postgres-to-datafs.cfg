<relstorage source>
  # ZODB Cache Dir
  blob-dir var/blob-cache-from-postgres
  blob-cache-size 10mb
  <postgresql>
    dsn dbname='$(RELSTORAGE_DB)' user='$(RELSTORAGE_ADMIN_USER)' host='$(RELSTORAGE_HOSTNAME)' port='$(RELSTORAGE_PORT)' password='$(RELSTORAGE_ADMIN_PASSWORD)'
  </postgresql>
</relstorage>

<blobstorage destination>
  blob-dir var/migrate/blobstorage
  <filestorage>
    path var/migrate/filestorage/Data.fs
  </filestorage>
</blobstorage>

